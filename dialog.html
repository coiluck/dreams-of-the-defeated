<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/src/css/default.css">
  <link rel="stylesheet" href="/src/css/dialog.css">
  <title>Dialog</title>
</head>
<body>
  <!-- ボタン用のフィルター -->
  <svg style="display: none;">
    <defs>
      <filter id="button-grunge-filter">
        <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>
  <div class="dialog-container">
    <div class="dialog-bg"></div>
    <div class="dialog-noise"></div>

    <p class="dialog-message" id="message">...</p>

    <div class="dialog-button-container" id="buttons"></div>
  </div>

  <script type="module">
    import { emit } from '@tauri-apps/api/event';

    // ─── URLパラメータからデータを取得（イベントタイミング問題を完全回避）───
    const params = new URLSearchParams(window.location.search);
    const message = params.get('message') ?? '';
    const buttonLabels = JSON.parse(params.get('buttonLabels') ?? '["OK"]');

    document.getElementById('message').textContent = message;

    const btnContainer = document.getElementById('buttons');

    buttonLabels.forEach((label, index) => {
      const item = document.createElement('div');
      item.className = 'dialog-button-item';

      const btn = document.createElement('button');
      btn.className = 'dialog-button';
      btn.textContent = label;
      btn.onclick = () => sendResult(index);

      item.appendChild(btn);
      btnContainer.appendChild(item);
    });

    // ─── キーボード操作サポート ───
    // Enter → 最後のボタン（通常OK）、Escape → 最初のボタン（通常Cancel）
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendResult(buttonLabels.length - 1);
      } else if (e.key === 'Escape') {
        e.preventDefault();
        sendResult(0);
      }
    });

    // ─── ウィンドウ外クリックでの誤操作防止（ダイアログにフォーカスを固定）───
    window.addEventListener('blur', () => {
      // フォーカスが外れても即座に戻す
      window.focus();
    });

    // 送信後の二重送信を防ぐフラグ
    let resultSent = false;

    async function sendResult(index) {
      if (resultSent) return;
      resultSent = true;
      await emit('dialog-result', index);
    }
  </script>
</body>
</html>
