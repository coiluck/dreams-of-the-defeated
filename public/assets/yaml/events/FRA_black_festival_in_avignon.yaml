id: FRA_black_festival_in_avignon
title:
  ja: アヴィニョンの黒い祭典
  en: Black Festival in Avignon
content:
  ja: |
    プロヴァンス地方、アヴィニョン。

    夜が、歌っている。ローヌ川の岸辺に、篝火が列をなした。数えきれぬほどの松明が城壁を染め上げ、14世紀の法王宮殿は光に揺れた。かつてローマ教会が亡命し、神の代理人たちが権謀に溺れたこの石の宮殿は今夜、別の神のために開かれた。
    夜気が骨まで冷える中、数千の人間が教皇宮殿の広場に集まった。公式には「芸術と精神の祭典」と告知されていた。画家が来た。詩人が来た。ルミナス・フランスの信徒が来た。退役軍人が来た。そして名前を持たない者たちが来た――飢えた顔をして、花を持って。

    アポリネール導師は来なかった。
    パリの病室で、老詩人は天井を見ていた。頭の古傷が、また疼いていた。
    朗読は低く始まり、やがて獣じみた叫びへと変容した。それはもはや詩の朗読ではなかった。儀式だった。彼は震え、泡を飛ばした。

    その夜、何が起きたかを正確に記述できる目撃者は存在しない。
    記録によれば、音楽が始まった。記録によれば、人々は踊り始めた。記録によれば、踊りはやがて走ることになり、走ることはやがて叫ぶことになり、叫ぶことはやがて――
    ドイツ国境の検問所に、報告が届いたのは夜半を過ぎた頃だった。
    数百人の男女が、花束と手榴弾を抱えて丘を越えてくる、と。

    彼らは歌いながら来た。
  en: |
    Provence, Avignon.

    The night is singing. Along the banks of the Rhône, a line of bonfires has been lit. Countless torches dye the city walls, and the 14th-century Palais des Papes trembles in the light. This stone palace, where the Roman Church once sought exile and God's deputies drowned in conspiracy, is opened tonight for a different god.
    As the night air chills to the bone, thousands of people gather in the square of the papal palace. Officially, it was announced as a 'Festival of Art and Spirit'. Painters came. Poets came. The faithful of Luminous France came. Veterans came. And the nameless ones came—with starving faces, carrying flowers.

    Guru Apollinaire did not come.
    In a Paris hospital room, the old poet was staring at the ceiling. The old wound on his head was aching again.
    The recitation began low, eventually transmuting into a beast-like howl. It was no longer a poetry reading. It was a ritual. He trembled, foaming at the mouth.

    There are no witnesses who can accurately describe what happened that night.
    According to the records, the music began. According to the records, the people began to dance. According to the records, dancing soon became running, running soon became screaming, and screaming soon became—
    It was past midnight when the report reached the checkpoint on the German border.
    Hundreds of men and women were crossing the hills, clutching bouquets and grenades.

    They came singing.
