id: FRA_byoushitsu_no_zenei_salon
title:
  ja: アポリネールのカリスマ
  en: Apollinaire's Charisma
content:
  ja: |
    1914年のドレスデン。屈辱の条約机を前に、フランスの外相は震える手でペンを走らせた。ロレーヌの鉱山を渡す。エジプトを渡す。スエズを渡す。渡す、渡す、渡す。理性的な政治家たちは、実に丁寧に、実に秩序立てて、フランスの心臓を切り刻んだ。フランスが百年かけて積み上げたものは、数枚の紙切れで解体された。
    そこに現れたのが、ギヨーム・アポリネールだった。
    詩人。砲兵将校。頭蓋骨に金属の破片を抱えたまま生き続ける男。包帯を巻いた頭を「選ばれた者の王冠」と称し、モンパルナスの病室から笑い声を上げ続けた男。
    彼の元へ、若者たちが来た。ブルトン、アラゴン、アルトー。彼らの目にはまだ光があった。若き芸術家らはアポリネールのカリスマに触れ、彼のもとで前衛的な芸術について議論した。アヴァンギャルドはいつしか政治思想と結びつき、彼らが光の党を結党するまでにさほど時間はかからなかった。その政治思想は現代でこのように呼ばれている――「シュルレアリスム」と。

    1919年11月28日。休戦記念日。
    政府主催の追悼式典の最中、光の党の行列がシャンゼリゼを埋め尽くした。彼らは花を持ち、炎を持ち、詩を歌いながら行進した。前夜のうちに、党の工作員たちはパリの主要な電話交換局と二つの印刷所を押さえていた。式典の混乱が始まると同時に、翌朝の新聞はすでに光の党の声明文を刷り始めていた。軍は動かなかった。将軍たちは、銃口を向ける相手の顔の中に、自分自身の絶望を見出したのかもしれない——あるいは単に、誰も最初に撃ちたくなかっただけかもしれない。
    アポリネールは壇上に立ち、宣言した。
    「フランス共和国は死んだ。今夜、崇高なる国が産声を上げる。」
    翌朝には、全土が新政権の手に落ちていた。

    それから13年。
    指導者は老いた。古い傷が疼き、アポリネールはいまや執務室よりも病床にいることが多い。政府内では三つの流れが渦を巻く――アルトーの残酷派、ブルトンの導師派、デュシャンの未来派。それぞれが「導師の後継者」を自任し、互いを敵と見なし、あるいは利用し合っている。
    だがアヴィニョンでは今日も儀式が開かれ、国境ではまた何かが起きようとしており、デリーからは不吉な報せが届いている。
    世界は動いている。
    理性なき世界が、その次の一手を模索している。

  en: |
    Dresden, 1914. Before the humiliating treaty table, the French Foreign Minister ran his pen with trembling hands. Handing over the mines of Lorraine. Handing over Egypt. Handing over Suez. Handing over, handing over, handing over. The rational politicians, quite politely and systematically, carved up the heart of France. What France had spent a century building was dismantled with a few scraps of paper.
    It was then that Guillaume Apollinaire appeared.
    A poet. An artillery officer. A man who continued to live with metal shrapnel lodged in his skull. A man who called his bandaged head the "crown of the chosen" and continued to laugh from his hospital room in Montparnasse.
    Young men flocked to him. Breton, Aragon, Artaud. There was still light in their eyes. The young artists were touched by Apollinaire's charisma and debated avant-garde art under his wing. The avant-garde soon merged with political ideology, and it didn't take long for them to form the Party of Light. That political ideology is known today as "Surrealism."

    November 28, 1919. Armistice Day.
    In the midst of a government-sponsored memorial ceremony, a procession of the Party of Light filled the Champs-Élysées. They marched carrying flowers, carrying flames, and singing poetry. During the previous night, the party's operatives had seized the main telephone exchanges and two printing presses in Paris. Just as the chaos of the ceremony began, the morning papers had already started printing the Party of Light's manifesto. The military did not move. Perhaps the generals saw their own despair in the faces of those they were supposed to point their guns at—or perhaps, simply no one wanted to be the first to shoot.
    Apollinaire stood on the podium and declared:
    "The French Republic is dead. Tonight, the Sublime State gives its first cry."
    By the next morning, the entire country had fallen into the hands of the new regime.

    Thirteen years have passed since then.
    The leader has grown old. His old wounds ache, and Apollinaire is now more often in his sickbed than in his office. Three currents swirl within the government—Artaud's Cruelty faction, Breton's Guru faction, and Duchamp's Futurist faction. Each considers themselves the "Guru's successor," viewing the others as enemies or exploiting them.
    Yet today, rituals are still held in Avignon, something is about to happen again at the borders, and ominous news arrives from Delhi.
    The world is moving.
    An irrational world is fumbling for its next move.
