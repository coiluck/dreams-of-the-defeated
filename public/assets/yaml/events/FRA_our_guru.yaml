id: FRA_byoushitsu_no_zenei_salon
title:
  ja: アポリネールのカリスマ
  en: Apollinaire's Charisma
content:
  ja: |
    1914年のドレスデン。屈辱の条約机を前に、フランスの外相は震える手でペンを走らせた。ロレーヌの鉱山を渡す。エジプトを渡す。スエズを渡す。渡す、渡す、渡す。理性的な政治家たちは、実に丁寧に、実に秩序立てて、フランスの心臓を切り刻んだ。フランスが百年かけて積み上げたものは、数枚の紙切れで解体された。
    そこに現れたのが、ギヨーム・アポリネールだった。
    詩人。砲兵将校。頭蓋骨に金属の破片を抱えたまま生き続ける男。包帯を巻いた頭を「選ばれた者の王冠」と称し、モンパルナスの病室から笑い声を上げ続けた男。
    彼の元へ、若者たちが来た。ブルトン、アラゴン、アルトー。彼らの目にはまだ光があった。若き芸術家らはアポリネールのカリスマに触れ、彼のもとで前衛的な芸術について議論した。アヴァンギャルドはいつしか政治思想と結びつき、彼らが光の党を結党するまでにさほど時間はかからなかった。その政治思想は現代でこのように呼ばれている――「シュルレアリスム」と。

    1919年11月28日。休戦記念日。
    政府主催の追悼式典の最中、光の党の行列がシャンゼリゼを埋め尽くした。彼らは花を持ち、炎を持ち、詩を歌いながら行進した。前夜のうちに、党の工作員たちはパリの主要な電話交換局と二つの印刷所を押さえていた。式典の混乱が始まると同時に、翌朝の新聞はすでに光の党の声明文を刷り始めていた。軍は動かなかった。将軍たちは、銃口を向ける相手の顔の中に、自分自身の絶望を見出したのかもしれない——あるいは単に、誰も最初に撃ちたくなかっただけかもしれない。
    アポリネールは壇上に立ち、宣言した。
    「フランス共和国は死んだ。今夜、崇高なる国が産声を上げる。」
    翌朝には、全土が新政権の手に落ちていた。

    それから13年。
    指導者は老いた。古い傷が疼き、アポリネールはいまや執務室よりも病床にいることが多い。政府内では三つの流れが渦を巻く――アルトーの残酷派、ブルトンの導師派、デュシャンの未来派。それぞれが「導師の後継者」を自任し、互いを敵と見なし、あるいは利用し合っている。
    だがアヴィニョンでは今日も儀式が開かれ、国境ではまた何かが起きようとしており、デリーからは不吉な報せが届いている。
    世界は動いている。
    理性なき世界が、その次の一手を模索している。

