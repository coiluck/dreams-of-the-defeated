id: GER_mawa_ndi_hanran_no_chinatsu
title:
  ja: マワ・ンディ反乱の鎮圧
  en: Suppression of the Mawa Ndi Uprising
content:
  ja: |
    ドイツ軍第17植民地旅団がルーアラバ川を渡ったのは、10月の乾季に入った直後だった。三週間の作戦行動。密林戦。補給の遅延。マラリアで倒れた兵士の数は、銃弾で倒れた数を上回った。
    最終的に、マワ・ンディの拠点は包囲された。
    降伏勧告の使者を送った。返答はなかった。
    二日後、拠点は沈黙した。
    ヴォルフ大佐は廃墟となった村を歩いた。焼けた小屋。引き裂かれた布切れ。誰かが描いたらしい壁画——巨大な象と、それを囲む無数の人間の絵——が、半分焼けて残っていた。
    マワ・ンディの遺体は見つからなかった。
    「逃亡か、焼死か」、とヴォルフ大佐は報告書に書いた。そして短く付け加えた。「作戦目標は達成された。」
    ベルリンでは、植民地次官が報告書を読み、ひとつ頷いた。地図の上の赤い色は、今日も変わらない。
    しかし密林は、記憶を持つ。
  en: |
    The German 17th Colonial Brigade crossed the Lualaba River shortly after the dry season began in October. A three-week operation. Jungle warfare. Supply delays. The number of soldiers who fell to malaria exceeded those who fell to bullets.
    Ultimately, Mawa Ndi's stronghold was surrounded.
    An envoy was sent to urge surrender. There was no reply.
    Two days later, the stronghold fell silent.
    Colonel Wolf walked through the ruined village. Burned huts. Torn pieces of cloth. A mural someone seemed to have drawn—a picture of a giant elephant surrounded by countless humans—remained half-burned.
    Mawa Ndi's body was never found.
    "Escaped, or burned to death," Colonel Wolf wrote in his report. Then he added briefly, "Operational objectives have been achieved."
    In Berlin, the Colonial Undersecretary read the report and gave a single nod. The red color on the map remains unchanged today.
    But the jungle remembers.
