id: FRA_shokuminchi_no_koutei
title:
  ja: 政府見解
  en: Government Viewpoint
content:
  ja: |
    哲学者が会議室に集まると、たいてい何かが死ぬ。
    今日死んだのは、一貫性だった。

    最初に口を開いた閣僚が言った。
    「我々は魂の解放を説く。ならば、アフリカの民の魂もまた――」
    別の男が遮った。
    「アフリカはまだ解放される準備ができていない。」
    沈黙。
    誰かが咳をした。誰かは天井を見ていた。窓の外では雨が降っていた。パリはいつも雨が降っている。
    「具体的には？」
    「具体的には」と男が繰り返した。「彼らの魂は、まだ原初の状態にある。」
    「……それは。」
    「そう。彼らは保護されなければならない。英独の物質文明から。理性の暴力から。我々が守らなければ、誰が守る。」
    もう誰も何も言わなかった。
    窓の外で、雨が強くなった。

    こうして、「精神的後見論」が閣議決定された。
    植民地は搾取されない。植民地は保護される。ルミナス・フランスは、英独の物質文明が破壊しようとしている「原初の夢」を守護する義務を持つ。インドシナの密林は、マリの赤土は、チュニジアの青い海は――シュルレアリスムの生きた実証である。
    徴税は続く。徴兵は続く。総督府は残る。
    ただし、総督の肩書きが変わった。
    「精神的後見人」と、今は呼ぶ。
  en: |
    When philosophers gather in a boardroom, something usually dies.
    Today, what died was consistency.

    The first minister to speak said:
    "We preach the liberation of the soul. Thus, the souls of the African people must also—"
    Another man interrupted.
    "Africa is not yet ready for liberation."
    Silence.
    Someone coughed. Someone else stared at the ceiling. Outside the window, it was raining. It is always raining in Paris.
    "Specifically?"
    "Specifically," the man repeated. "Their souls are still in a primal state."
    "...I see."
    "Yes. They must be protected. From Anglo-German material civilization. From the violence of reason. If we do not protect them, who will?"
    No one said anything else.
    Outside the window, the rain grew heavier.

    Thus, the doctrine of "Spiritual Guardianship" was approved by the cabinet.
    The colonies are not exploited. The colonies are protected. Luminous France has an absolute obligation to guard the "primal dream" that Anglo-German material civilization seeks to destroy. The dense jungles of Indochina, the red earth of Mali, the blue seas of Tunisia—these are the living proof of Surrealism.
    Tax collection continues. Conscription continues. The Governor-General's office remains intact.
    However, the Governor-General's title has changed.
    He is now known as the "Spiritual Guardian."
