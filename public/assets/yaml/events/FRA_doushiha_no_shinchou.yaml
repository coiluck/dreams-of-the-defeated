id: FRA_doushiha_no_shinchou
title:
  ja: ブルトンへの支持
  en: Support for Duchamp
content:
  ja: |
    導師派の主張は、三派の中でもっとも「聞きやすい」。
    『革命は成った。国家は動いている。ならば今必要なのは、破壊ではなく深化だ』
    ドイツへの報復の前にまずは国内を、自分たちの明日の暮らしを。そう考える国民も少なくない。導師のあとに続くものとして支持が集まるのも当然だった。

    導師は死んだ。夢はまだ生きている。夢を生かし続けることが、自分に残された仕事だと、ブルトンは信じていた――あるいは、そう信じることにした。
  en: |
    The Guru faction's claims are the most 'palatable' among the three factions.
    'The revolution is achieved. The state is in motion. What is needed now, then, is not destruction, but deepening.'
    Before retaliating against Germany, first focus on the homeland, on our own lives tomorrow. Not a few citizens think this way. It was only natural that support would gather for those following in the Guru's footsteps.

    The Guru is dead. The dream still lives. Breton believed—or rather, decided to believe—that keeping the dream alive was the only task left to him.
