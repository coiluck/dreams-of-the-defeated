id: FRA_kuroki_taiyou_no_taikan
title:
  ja: 黒き太陽の戴冠
  en: Coronation of the Black Sun
content:
  ja: |
    ノートルダム大聖堂のステンドグラスは、すべて黒い布で覆われていた。
    光を遮断した堂内には、松明の赤い炎だけが揺れている。祭壇の前に立つアントナン・アルトーは、王冠も、勲章も身につけていなかった。アルトーはゆっくりと信者たちの前に進み出た。

    「夢想の時間は終わった」と、彼は静かに、しかし堂内に響き渡る声で言った。
    最前列にはルミナス公安委員会の将校たちが直立不動で並び、その後ろには「再教育」を終えたばかりの旧ブルトン派の芸術家たちが並んでいる。
    「感傷は病だ。妥協は腐敗だ。我々はこれまで、自らの内なる軟弱な肉を切り裂き、不要な臓器を摘出してきた。痛みを伴う治療だったが、フランスという身体は今や純化された。」
    アルトーはゆっくりと手を挙げる。その指先は、ステンドグラスの向こう――東の方角を指していた。
    「だが、真の病巣は外にある。ライン川の向こうで、鉄と歯車に塗れた巨大な腫瘍が脈打っている。」

    歓声はなかった。ただ、軍靴が石畳を踏み鳴らす冷たく統制された音だけが、大聖堂を揺らした。
    黒き太陽が昇る。それは世界を照らすためではない。すべてを焼き尽くし、無菌の灰にするために昇るのだ。
    アルトーの手術が、いよいよ国境を越えようとしていた。
  en: |
    The stained glass windows of Notre-Dame Cathedral were all covered with black cloth.
    Inside the hall, cut off from the light, only the red flames of torches flickered. Antonin Artaud, standing before the altar, wore neither a crown nor medals. Artaud slowly stepped forward before the faithful.

    "The time for reverie is over," he said quietly, yet with a voice that echoed throughout the hall.
    In the front row stood the officers of the Luminous Committee of Public Safety at rigid attention, and behind them stood the artists of the old Breton faction who had just finished their "re-education."
    "Sentimentality is a disease. Compromise is rot. We have thus far sliced open our own soft, inner flesh and excised the unnecessary organs. It was a painful treatment, but the body of France is now purified."
    Artaud slowly raised his hand. His fingertips pointed beyond the stained glass—towards the East.
    "But the true lesion lies outside. Across the Rhine, a massive tumor slathered in iron and gears is pulsating."

    There were no cheers. Only the coldly disciplined sound of military boots stomping on the cobblestones shook the cathedral.
    The Black Sun rises. It does not rise to illuminate the world. It rises to burn everything to the ground, reducing it to sterile ash.
    Artaud's surgery was finally about to cross the border.
