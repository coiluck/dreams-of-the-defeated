id: FRA_kakumei_wa_tsuzuku
title:
  ja: 野性の思考の保護区
  en: Wild Thought Protection Zone
content:
  ja: |
    レオン・ドゴンは通訳を介してこう言った。
    「あなた方は、私たちの夢を守りたいと言う。」
    「その通りだ」と精神的後見人は答えた。
    「では、なぜ私たちは、あなた方の夢を見せられているのですか。」
    通訳はしばらく黙った。それから、少し違う意味の言葉に訳した。
    会議は滞りなく終わった。

    アルジェリアの奥地に、保護区が設置された。
    趣旨はこうだ――英独の物質文明が侵食する前に、アフリカの「生きた思考」を記録し、保存し、研究する。パリからシュルレアリスト人類学者が派遣される。彼らは現地の儀式を観察し、夢を書き取り、神話を採集する。
    現地の人々は、「保護される」。
    伐採は禁止された。ただしフランス企業による採掘権は既に発行済みだった。
    儀式への介入は禁止された。ただし後見人府が「精神的に有害」と判断した場合は例外とされた。
    移住は禁止された。ただし「保護区の管理上の理由」による再配置は禁止ではなかった。

    パリの展覧会場に、保護区から運ばれた仮面が並んだ。
    「野生の思考――原初の夢との対話展」
    入場料は二フラン。盛況だった。
    会場の隅に、場違いに小さな案内板があった。
    「展示物の一部は、現地の協力者によって提供されました。」
    協力の意味については、案内板は何も言わなかった。
  en: |
    Léon Dogon spoke through the interpreter.
    "You say you wish to protect our dreams."
    "Exactly," the Spiritual Guardian replied.
    "Then why are we being forced to watch your dreams instead?"
    The interpreter remained silent for a moment. Then, he translated the words into something with a slightly different meaning.
    The meeting concluded without a hitch.

    Deep in the Algerian hinterland, a protection zone was established.
    The premise was this: to record, preserve, and study the "living thought" of Africa before the material civilizations of Britain and Germany could erode it. Surrealist anthropologists are dispatched from Paris. They observe local rituals, transcribe dreams, and collect myths.
    The local people are "protected."
    Logging was banned. However, mining rights previously issued to French corporations remained valid.
    Intervention in rituals was banned. An exception was made, however, if the Guardianship Office deemed them "spiritually harmful."
    Migration was banned. But relocation for "administrative reasons within the protection zone" was not prohibited.

    In an exhibition hall in Paris, masks transported from the protection zone were lined up.
    "Savage Thought: A Dialogue with Primal Dreams Exhibition"
    Entry fee: two francs. It was a massive success.
    In the corner of the hall, there was a small, out-of-place placard.
    "Some of the exhibits were provided by local collaborators."
    The placard said absolutely nothing about what that collaboration entailed.
