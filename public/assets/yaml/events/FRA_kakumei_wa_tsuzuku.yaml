id: FRA_kakumei_wa_tsuzuku
title:
  ja: 革命は続く
  en: Revolution Lasts
content:
  ja: |
    残酷派の集会は、もはや集会と呼べない規模になっていた。
    廃工場、地下礼拝堂、セーヌ河岸の倉庫街。どこへ行っても人がいた。退役軍人、失業した工場労働者、十代の学生、かつては導師派を名乗っていた芸術家たち。彼らはアルトーの名を叫ぶわけではなかった。ただ集まり、ただ燃えていた。
    指導者を失った怒りは、方向を求めている。
    アルトーはその方向を、すでに決めていた。

    演説は短かった。
    「導師を殺したのは誰か。」
    アルトーは聴衆を見渡した。誰も答えない。
    「砲弾だ。ドイツの砲弾だ。二十二年前に撃ち込まれ、二十二年かけて仕事を終えた。我々の指導者の脳を、ドイツが殺した。」
    群衆は揺れた。
    「ならば我々は何をすべきか。悼むか。詩を書くか。」彼は首を振った。「違う。燃やすのだ。」

    翌朝、ベルリン大使館の前に花束が投げ込まれた。次の夜、石が飛んだ。その次の夜、火が出た。
    ルミナス公安委員会は犯人を逮捕しなかった。

    革命は続く。
    導師なき革命が、どこへ向かうのかを、まだ誰も知らない。
  en: |
    The gatherings of the Cruelty faction had grown to a scale that could no longer be called mere gatherings.
    Abandoned factories, underground chapels, warehouse districts along the Seine. Everywhere you went, there were people. Veterans, unemployed factory workers, teenage students, artists who once called themselves the Guru faction. They did not shout Artaud's name. They simply gathered, and simply burned.
    The anger of losing their leader seeks a direction.
    Artaud had already decided upon that direction.

    The speech was short.
    'Who killed the Guru?'
    Artaud looked over the audience. No one answered.
    'An artillery shell. A German artillery shell. Fired twenty-two years ago, it took twenty-two years to finish the job. Germany murdered our leader's brain.'
    The crowd swayed.
    'Then what must we do? Mourn? Write poems?' He shook his head. 'No. We burn.'

    The next morning, bouquets were thrown in front of the Berlin embassy. The next night, stones flew. The night after that, fires broke out.
    The Luminous Committee of Public Safety made no arrests.

    The revolution continues.
    No one yet knows where the revolution without its Guru is heading.
