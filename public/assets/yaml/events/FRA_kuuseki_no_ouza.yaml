id: FRA_byoushitsu_no_zenei_salon
title:
  ja: 導師の死！
  en: Guru's Death!
content:
  ja: |
    雨が降っていた。
    パリはいつも雨が降っている。革命の夜も、戴冠の朝も、そして今夜も。セーヌは黒く、街灯は滲み、凱旋門の石に刻まれた詩の文字が濡れて光る。
    病院の一室で、ギヨーム・アポリネールは死んだ。

    享年52歳。死因は、頭蓋骨の古い傷の悪化による脳出血。
    1914年の砲弾が、18年越しに仕事を終えた。
    側にいたのは、若い看護師一人だったという。後継を自任する三派閥の重鎮たちは、それぞれ別の部屋で、それぞれ別の謀議に勤しんでいた。導師の最期を看取ったのが、誰でもない名もなき娘だったというのは、あるいは詩的な結末と言えるかもしれない――アポリネールなら、そう言っただろう。

    彼は何を夢見ていたのか。
    フランスの「再生」か。東洋の叡智によって鍛え直された、新しい文明の夜明けか。それとも――ただ、頭の痛みから解放される夜を、ずっと待っていただけなのか。
    包帯の下に何があったのか、誰も最後まで知らなかった。

    電話が鳴り始めたのは、死の報せから三十分も経たない頃だった。
    アルトーの秘書が走り、ブルトンの副官が怒鳴った。誰もが泣いていた。誰もが、泣きながら次の手を打っていた。
    これが、彼らの師匠から受け継いだものだった。

    翌朝、ルミナス・フランス国営放送は粛々と喪を告げた。
    アナウンサーの声は震えていたが、原稿は三派閥の合議によって既に書き直された後だった。「導師の遺志を継ぎ」という文言だけが、三つの版に共通していた。その「遺志」が何を指すかについては、三つの版はそれぞれ異なるようだった。

    指導者は死んだ。
    崇高なる国は、まだ死んでいない。

  en: test
buttons:
  - text:
      ja: どうか安らかに
      en: test
