id: FRA_byoushitsu_no_zenei_salon
title:
  ja: 導師の死！
  en: Guru's Death!
content:
  ja: |
    雨が降っていた。
    パリはいつも雨が降っている。革命の夜も、戴冠の朝も、そして今夜も。セーヌは黒く、街灯は滲み、凱旋門の石に刻まれた詩の文字が濡れて光る。
    病院の一室で、ギヨーム・アポリネールは死んだ。

    享年52歳。死因は、頭蓋骨の古い傷の悪化による脳出血。
    1914年の砲弾が、18年越しに仕事を終えた。
    側にいたのは、若い看護師一人だったという。後継を自任する三派閥の重鎮たちは、それぞれ別の部屋で、それぞれ別の謀議に勤しんでいた。導師の最期を看取ったのが、誰でもない名もなき娘だったというのは、あるいは詩的な結末と言えるかもしれない――アポリネールなら、そう言っただろう。

    彼は何を夢見ていたのか。
    フランスの「再生」か。東洋の叡智によって鍛え直された、新しい文明の夜明けか。それとも――ただ、頭の痛みから解放される夜を、ずっと待っていただけなのか。
    包帯の下に何があったのか、誰も最後まで知らなかった。

    電話が鳴り始めたのは、死の報せから三十分も経たない頃だった。
    アルトーの秘書が走り、ブルトンの副官が怒鳴った。誰もが泣いていた。誰もが、泣きながら次の手を打っていた。
    これが、彼らの師匠から受け継いだものだった。

    翌朝、ルミナス・フランス国営放送は粛々と喪を告げた。
    アナウンサーの声は震えていたが、原稿は三派閥の合議によって既に書き直された後だった。「導師の遺志を継ぎ」という文言だけが、三つの版に共通していた。その「遺志」が何を指すかについては、三つの版はそれぞれ異なるようだった。

    指導者は死んだ。
    崇高なる国は、まだ死んでいない。

  en: |
    It was raining.
    It always rains in Paris. On the night of the revolution, on the morning of the coronation, and tonight. The Seine is black, the streetlights blur, and the letters of poetry carved into the stone of the Arc de Triomphe gleam wetly.
    In a hospital room, Guillaume Apollinaire died.

    Aged 52. Cause of death: cerebral hemorrhage due to the aggravation of an old wound to the skull.
    A 1914 artillery shell had finally finished its work, 18 years later.
    It is said that only a single young nurse was by his side. The heavyweights of the three factions, each fancying themselves as his successor, were in different rooms, busy with their own separate plots. The fact that a nameless girl, a nobody, watched over the Guru's final moments might be called a poetic conclusion—Apollinaire would have certainly said so.

    What was he dreaming of?
    The "rebirth" of France? The dawn of a new civilization reforged by the wisdom of the East? Or—was he just waiting all along for a night that would finally free him from the pain in his head?
    No one ever knew until the very end what lay beneath the bandages.

    The telephones started ringing less than thirty minutes after the news of his death.
    Artaud's secretaries ran, Breton's lieutenants bellowed. Everyone was crying. Everyone, while crying, was already making their next move.
    This was what they had inherited from their mentor.

    The next morning, the Luminous France State Broadcasting solemnly announced the mourning.
    The announcer's voice trembled, but the manuscript had already been rewritten by the consensus of the three factions. Only the phrase "inheriting the Guru's will" was common to all three versions. As for what that "will" referred to, the three versions seemed to differ entirely.

    The leader is dead.
    The Sublime State is not dead yet.
