id: GER_kaiser_no_rakujitsu
title:
  ja: 老帝の崩御
  en: test
content:
  ja: |
    ベルリンは静かだった。それは平和の静寂ではなく、息を殺した街の静寂だった。ウンター・デン・リンデンの並木は白く塗り込められ、ブランデンブルク門の石造りの柱は灰色の空に溶けている。

    彼は勝者として死んだ。それだけは確かだ。
    1913年、パリ郊外で崩れ落ちたフランス軍の防衛線。ドレスデンで調印された講和条約。ミッテルアフリカの赤く塗られた地図。彼はそれらすべてを己の目で見た。敗れた敵の顔を見た。歴史上、それほど多くのものを手に入れた君主は多くない。
    ここ数十年でドイツは大きく成長した。その成長は彼の功績である。

    葬儀は三日後に執り行われる。
    帝国では、すでに後継を巡る議論が始まっている。老帝の体温が冷めないうちから、次の形を巡って動き始めていた。
    それが国家というものだ。
    悲しむ暇など、どこにもない。
  en: test
