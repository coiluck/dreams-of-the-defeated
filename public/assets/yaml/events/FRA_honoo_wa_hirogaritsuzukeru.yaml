id: FRA_honoo_wa_hirogaritsuzukeru
title:
  ja: イギリスとの同盟
  en: Alliance with the Kingdom
content:
  ja: |
    ライン川の向こう側には、我々が忌み嫌うすべてがある。もちろん、ドイツ帝国のことだ。彼らの破壊。それこそが、崇高なるフランスに課せられた根源的使命であった。

    だが神聖なる破壊のためには、俗悪なる手段もまた必要となる。

    海を隔てた島国、イギリス。かつて我々の植民地を奪った彼らもまた、肥大化するドイツのミッテルアフリカ計画に怯え、新たな孤立主義の中で震えていた。

    昨夜、スイスの寂れた山荘でフランスと英国がテーブルを挟んだ。対独包囲網の構築である。
    イギリス側は、我々の「非合理的な儀式」や「精神的拡張」を嘲笑しながらも、その狂気がドイツの背面に突き刺さる鋭い刃になることを見抜いていた。我々もまた、彼らの打算的な資金と海軍力が、浄化を早める供物となることを知っていた。

    契約は結ばれた。「王者に安眠なし」—— この言葉を忘れ、ライン川の向こうで惰眠を貪る覇者に向けて、嵐が吹き荒れようとしている。

  en: test
