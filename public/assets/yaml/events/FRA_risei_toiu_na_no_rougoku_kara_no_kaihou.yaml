id: FRA_risei_to_iu_na_no_rougoku
title:
  ja: 理性という名の牢獄からの解放
  en: Liberation from the Prison of Reason
content:
  ja: |
    アンドレ・ブルトンは、執務室の窓からパリの街を見下ろしていた。
    アルトーのような流血は必要なかった。ただ、人々の無意識の蓋を開け、そこに「新しい神話」を注ぎ込めばよかったのだ。

    「我々は、理性の牢獄からついに解放された」

    背後に立つ大臣たちは、何も言わなかった。ブルトンは語り続けた。
    「しかし、外の世界はまだその冷たい牢獄の中にある。英独の物質主義者どもは未だに我々の夢を破壊しようと企図している。」

    ブルトンは最後に、こう締めくくった。
    「彼らを我々の夢で塗り替える必要があるし、現にその準備はできている。」

    それは血を流さない革命の完成であり、同時に、世界に対する最も静かで、最も恐ろしい宣戦布告であった。
  en: |
    André Breton looked down at the streets of Paris from his office window.
    There was no need for Artaud's bloodshed. All that was required was to pry open the lid of the people's unconscious and pour in a "new myth."

    "We have finally been liberated from the prison of reason."

    The ministers standing behind him said nothing. Breton continued.
    "However, the outside world remains trapped within that cold prison. The Anglo-German materialists still scheme to destroy our dreams."

    Breton concluded with this:
    "We must paint over them with our own dreams, and the preparations to do so are already complete."

    It was the culmination of a bloodless revolution, and simultaneously, the quietest, most terrifying declaration of war upon the world.
