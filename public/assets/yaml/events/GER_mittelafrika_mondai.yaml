id: GER_mittelafrika_mondai
title:
  ja: ミッテルアフリカ問題
  en: Mittel Africa Problem
content:
  ja: |
    地図は嘘をつかない。
    植民地省の壁に貼られた巨大なアフリカ地図。赤く塗られた領域は、大陸の心臓部をまるごと飲み込んでいる。チャド湖畔、ガボンの密林、カメルーンの高地。ドレスデン条約が生み落としたミッテルアフリカは、紙の上では完璧な帝国だった。
    紙の上では。
    植民地次官ハウスホーファーは、今朝届いた報告書の束を机に叩きつけた。カタンガ銅山での生産量低下。キブ湖周辺での武装集団の出没。バンギ駐屯地への夜間襲撃。
    数字は正直だ。地図よりもずっと正直だ。
    「我々は大陸を手に入れた」、とハウスホーファーは独り言ちた。「だが大陸は、まだ我々のものになっていない。」
    赤く塗られた領域の内側で、何かが燃えている。小さな火だ。今はまだ。
  en: |
    Maps do not lie.
    A massive map of Africa hangs on the wall of the Colonial Office. The area painted red swallows the heart of the continent whole. The shores of Lake Chad, the jungles of Gabon, the highlands of Cameroon. Mittelafrika, born from the Treaty of Dresden, was a perfect empire on paper.
    On paper.
    Colonial Undersecretary Haushofer slammed the stack of reports that arrived this morning onto his desk. A decline in production at the Katanga copper mines. The emergence of armed groups around Lake Kivu. A night raid on the Bangui garrison.
    Numbers are honest. Much more honest than maps.
    "We have acquired the continent," Haushofer muttered to himself. "But the continent is not yet ours."
    Inside the area painted red, something is burning. A small fire. For now.
