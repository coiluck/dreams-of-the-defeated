id: GER_mittelafrika_mondai
title:
  ja: ミッテルアフリカ問題
  en: Mittel Africa Problem
content:
  ja: |
    地図は嘘をつかない。
    植民地省の壁に貼られた巨大なアフリカ地図。赤く塗られた領域は、大陸の心臓部をまるごと飲み込んでいる。チャド湖畔、ガボンの密林、カメルーンの高地。ドレスデン条約が生み落としたミッテルアフリカは、紙の上では完璧な帝国だった。
    紙の上では。
    植民地次官ハウスホーファーは、今朝届いた報告書の束を机に叩きつけた。カタンガ銅山での生産量低下。キブ湖周辺での武装集団の出没。バンギ駐屯地への夜間襲撃。
    数字は正直だ。地図よりもずっと正直だ。
    「我々は大陸を手に入れた」、とハウスホーファーは独り言ちた。「だが大陸は、まだ我々のものになっていない。」
    赤く塗られた領域の内側で、何かが燃えている。小さな火だ。今はまだ。
  en: test
