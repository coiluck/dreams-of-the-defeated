id: FRA_zankokuha_no_inbou
title:
  ja: アルトーの陰謀
  en: Artaud's Plot
content:
  ja: |
    アントナン・アルトーは、葬儀に出席しなかった。
    理由を問われると、彼はこう答えたという。「私は死者と話さない。生者と話す。」

    導師の棺がペール・ラシェーズ墓地へ運ばれた日、アルトーはパリ12区の倉庫に人を集めていた。元秘密警察の将校、印刷工、元前線将校、詩人が三人。窓には布が張られ、テーブルの上には地図と名簿が広げられていた。
    名簿には、名前に印がついていた。
    赤い印と、黒い印と。

    アルトーが「残酷」と呼ぶとき、それは暴力を意味しない――と、彼自身はいつも言っていた。「残酷とは、厳密さのことだ。外科医のメスの冷たさのことだ。感傷を切り捨て、必要なことだけを行う意志のことだ。」
    その言葉を、彼の部下たちは額面通りに受け取っていた。
    彼らはすでに動いていた。

    ブルトンはまだ、合議で決めようとしている。
    その間に、アルトーは地図の上に指を走らせる。印刷所、放送局、兵舎、電話局。
    1919年に、アポリネール導師はこうやって国を取った。
    師の方法を、師の後継者が使う。これ以上に正統な継承があるだろうか。
  en: |
    Antonin Artaud did not attend the funeral.
    When asked why, he reportedly answered, "I do not speak to the dead. I speak to the living."

    On the day the Guru's coffin was carried to Père Lachaise Cemetery, Artaud was gathering men in a warehouse in the 12th arrondissement of Paris. A former secret police officer, a printer, a former frontline officer, and three poets. The windows were draped with cloth, and maps and rosters were spread across the table.
    On the roster, names were marked.
    Red marks, and black marks.

    When Artaud speaks of "cruelty," he does not mean violence—or so he always claimed. "Cruelty is rigor. It is the absolute coldness of a surgeon's scalpel. It is the will to cut away sentimentality and do only what is strictly necessary."
    His subordinates took those words at face value.
    They were already making their moves.

    Breton is still trying to decide things by committee.
    Meanwhile, Artaud's finger traces lines across the map. The printing press, the broadcasting station, the barracks, the telephone exchange.
    In 1919, the Guru Apollinaire seized the nation exactly like this.
    The successor employs the master's methods. Could there be any truer inheritance?
